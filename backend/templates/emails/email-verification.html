<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱地址验证</title>
  <style>
    body { font-family: 'Arial', 'Microsoft YaHei', sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
    .header h1 { margin: 0; font-size: 24px; }
    .header p { margin: 10px 0 0 0; opacity: 0.9; }
    .content { padding: 30px; }
    .content p { margin-bottom: 15px; }
    .button { display: inline-block; padding: 12px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; margin: 20px 0; font-weight: bold; }
    .button:hover { background: #5568d3; }
    .link-box { background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #e0e0e0; word-break: break-all; margin: 15px 0; font-size: 12px; color: #666; }
    .footer { background: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #666; border-top: 1px solid #e0e0e0; }
    .notice { background: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin: 20px 0; border-radius: 4px; }
    .notice p { margin: 0; color: #856404; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔐 密评备考系统</h1>
      <p>邮箱地址验证</p>
    </div>
    <div class="content">
      <p>您好，<strong>{{username}}</strong>！</p>
      <p>感谢您注册密评备考系统。请点击下面的按钮验证您的邮箱地址：</p>

      <center><a href="{{verificationUrl}}" class="button">✉️ 验证邮箱地址</a></center>

      <p>如果按钮无法点击，请复制以下链接到浏览器地址栏：</p>
      <div class="link-box">{{verificationUrl}}</div>

      <div class="notice">
        <p>⚠️ <strong>注意：</strong>验证链接将在 <strong>{{expiryHours}}小时</strong> 后失效，请尽快完成验证。</p>
      </div>
    </div>
    <div class="footer">
      <p>如果您没有注册密评备考系统账户，请忽略此邮件。</p>
      <p>© 2026 密评备考系统 | 商用密码应用安全性评估从业人员考核备考平台</p>
    </div>
  </div>
</body>
</html>
