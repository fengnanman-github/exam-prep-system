<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户状态通知</title>
  <style>
    body { font-family: 'Arial', 'Microsoft YaHei', sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
    .header h1 { margin: 0; font-size: 24px; }
    .header p { margin: 10px 0 0 0; opacity: 0.9; }
    .content { padding: 30px; }
    .status { padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
    .status.approved { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
    .status.rejected { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    .status-icon { font-size: 48px; margin-bottom: 10px; }
    .status-text { font-size: 18px; font-weight: bold; margin: 0; }
    .button { display: inline-block; padding: 12px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; margin: 20px 0; font-weight: bold; }
    .button:hover { background: #5568d3; }
    .footer { background: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #666; border-top: 1px solid #e0e0e0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔐 密评备考系统</h1>
      <p>账户状态通知</p>
    </div>
    <div class="content">
      <p>您好，<strong>{{username}}</strong>！</p>

      <div class="status {{status}}">
        <div class="status-icon">{{#if approved}}✅{{else}}❌{{/if}}</div>
        <p class="status-text">{{message}}</p>
      </div>

      {{#if approved}}
      <p style="text-align: center;">您现在可以登录系统开始学习了。</p>
      <center><a href="{{frontendUrl}}/login" class="button">🚀 立即登录</a></center>
      {{else}}
      <p style="text-align: center;">如有疑问，请联系系统管理员。</p>
      {{/if}}
    </div>
    <div class="footer">
      <p>© 2026 密评备考系统 | 商用密码应用安全性评估从业人员考核备考平台</p>
    </div>
  </div>
</body>
</html>
