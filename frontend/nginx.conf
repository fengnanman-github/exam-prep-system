# 内存优化配置 - 适配2GB环境
worker_processes 1;          # 2核环境使用1个工作进程
worker_rlimit_nofile 4096;   # 文件描述符限制

events {
    worker_connections 512;  # 减少连接数，适应2GB内存
    use epoll;               # Linux高效IO模型
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 内存优化设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;     # 减少连接保持时间
    client_max_body_size 10M; # 限制上传大小

    # Gzip压缩 - 节省带宽和内存
    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain application/json application/javascript text/css application/xml text/xml;
    gzip_disable "msie6";

    # 缓冲区优化
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # 解析器用于服务发现
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # 静态资源缓存
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 特别处理 index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 为 JS/CSS 文件设置短期缓存（文件名包含hash）
        location ~* \.(js|css)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # 图片等静态资源长期缓存
        location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # API代理到后端 - 代理到主机上的后端服务
        location /api/ {
            proxy_pass http://172.17.0.1:13000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置 - 解决502错误
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            send_timeout 60s;

            # 代理缓冲优化
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 禁用访问日志以节省IO
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;
    }
}