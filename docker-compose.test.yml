# 测试环境Docker配置
# 端口配置：
# - 前端：18081（生产：18080）
# - 后端：13001（生产：13000）
# - 数据库：15433（生产：15432）
# - Redis：16380（生产：16379）
# 数据库：exam_db_test（生产：exam_db）

services:
  # 前端服务
  frontend-test:
    build: ./frontend
    ports:
      - "18081:80"
    depends_on:
      - backend-test
    networks:
      - exam-test-network
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:13001

  # 后端服务
  backend-test:
    build: ./backend
    ports:
      - "13001:3000"
    environment:
      - NODE_ENV=test
      - DB_HOST=db-test
      - DB_PORT=5432
      - DB_NAME=exam_db_test
      - DB_USER=exam_user
      - DB_PASSWORD=exam_pass123
      - REDIS_HOST=redis-test
    depends_on:
      - db-test
      - redis-test
    networks:
      - exam-test-network

  # 数据库
  db-test:
    image: postgres:13
    environment:
      - POSTGRES_DB=exam_db_test
      - POSTGRES_USER=exam_user
      - POSTGRES_PASSWORD=exam_pass123
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "15433:5432"
    volumes:
      - exam-prep-system_db_data_test:/var/lib/postgresql/data
    networks:
      - exam-test-network

  # Redis缓存
  redis-test:
    image: redis:6-alpine
    ports:
      - "16380:6379"
    networks:
      - exam-test-network

volumes:
  exam-prep-system_db_data_test:
    external: false

networks:
  exam-test-network:
    driver: bridge
